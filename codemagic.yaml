workflows:
  guidik-android-debug:
    name: Guidik Android Debug Build
    max_build_duration: 30
    instance_type: linux
    environment:
      flutter: stable
    scripts:
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Build APK (debug)
        script: flutter build apk --debug
    artifacts:
      - build/**/outputs/**/*.apk
